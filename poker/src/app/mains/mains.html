<div class="liste_mains">
  @for(main of different_mains.getMains(); track main.nom) {
    <div class="main">
      <h3>{{ main.nom }}</h3>
      <div class="liste_cartes">
        @for(carte of main.cartes; track carte.valeur) {
          <div class="carte">
            <img [src]=carte.img [alt]="carte.img"/>
          </div>
        }
      </div>
      @if (mainDetails == main){

      }
    </div>
  }
</div>
